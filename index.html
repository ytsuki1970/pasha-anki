<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FBF4E6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="パシャ暗記" />
<title>パシャ暗記</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --paper:#FBF4E6;
    --paper-2:#FFFDF8;
    --dot:#ECE0C6;
    --ink:#3B362E;
    --ink-soft:#8a8174;
    --line:#ECE3D2;

    --pink:#FF6F8F;     --pink-d:#E04A6E;
    --teal:#1FC3B0;     --teal-d:#119687;
    --yellow:#FFC23C;   --yellow-d:#E89C00;
    --sky:#54C4F2;      --sky-d:#2E9FD1;
    --grape:#A98BF0;    --grape-d:#8463D4;
    --leaf:#8BC53F;     --leaf-d:#69A323;
    --orange:#FF9A4D;   --orange-d:#E8761F;

    --primary:var(--pink);
    --primary-d:var(--pink-d);

    --shadow:0 10px 24px rgba(80,60,30,.10), 0 2px 6px rgba(80,60,30,.06);
    --shadow-lg:0 22px 50px rgba(80,60,30,.16);
    --radius:22px;

    --font-display:'Mochiy Pop One','Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;
    --font-body:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic UI','Yu Gothic',system-ui,sans-serif;
    --font-num:'Baloo 2','Mochiy Pop One',sans-serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at center, rgba(255,177,153,.16), rgba(255,177,153,0) 60%),
      radial-gradient(var(--dot) 1.6px, transparent 1.7px);
    background-size:auto, 26px 26px;
    background-position:center -120px, -8px -8px;
    background-repeat:no-repeat, repeat;
    min-height:100vh;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  [data-action],[data-judge],[data-mode],[data-opt],[data-ocrset]{cursor:pointer;touch-action:manipulation}
  input,textarea,select{font-family:inherit}
  img{max-width:100%;display:block}

  /* ---------- layout ---------- */
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 120px;}
  .topbar{
    position:sticky;top:0;z-index:30;
    backdrop-filter:saturate(1.2) blur(6px);
    background:linear-gradient(var(--paper), rgba(251,244,230,.86));
    border-bottom:2px dashed var(--line);
  }
  .topbar-in{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:12px 16px;}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:20px;color:var(--ink);}
  .logo .badge{
    width:38px;height:38px;border-radius:13px;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(135deg,#FFE08A,#FF9FB3);box-shadow:var(--shadow);transform:rotate(-6deg);
  }
  .logo small{display:block;font-family:var(--font-body);font-weight:700;font-size:11px;color:var(--ink-soft);letter-spacing:.06em}
  .spacer{flex:1}

  .iconbtn{
    width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:18px;
    background:var(--paper-2);box-shadow:var(--shadow);transition:transform .12s, box-shadow .12s;
  }
  .iconbtn:active{transform:translateY(2px) scale(.97)}

  /* ---------- buttons ---------- */
  .btn{
    --c:var(--primary); --cd:var(--primary-d);
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--c);color:#fff;font-weight:800;font-size:16px;
    padding:14px 20px;border-radius:16px;box-shadow:0 5px 0 var(--cd), var(--shadow);
    transition:transform .08s, box-shadow .08s;line-height:1;text-align:center;
  }
  .btn:active{transform:translateY(5px);box-shadow:0 0 0 var(--cd), var(--shadow)}
  .btn.lg{font-size:18px;padding:17px 24px}
  .btn.block{display:flex;width:100%}
  .btn.ghost{background:var(--paper-2);color:var(--ink);box-shadow:0 5px 0 var(--line), var(--shadow)}
  .btn.ghost:active{box-shadow:0 0 0 var(--line), var(--shadow)}
  .btn.teal{--c:var(--teal);--cd:var(--teal-d)}
  .btn.yellow{--c:var(--yellow);--cd:var(--yellow-d);color:#5a3d00}
  .btn.sky{--c:var(--sky);--cd:var(--sky-d)}
  .btn.grape{--c:var(--grape);--cd:var(--grape-d)}
  .btn.sm{font-size:14px;padding:10px 14px;border-radius:13px;box-shadow:0 4px 0 var(--cd), var(--shadow)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--paper-2);color:var(--ink-soft);
    font-weight:700;font-size:12px;padding:6px 11px;border-radius:999px;box-shadow:var(--shadow)}

  /* ---------- cards / panels ---------- */
  .panel{background:var(--paper-2);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .hello{
    margin:18px 0 6px;display:flex;align-items:center;gap:16px;
  }
  .hello h1{font-family:var(--font-display);font-size:23px;margin:0;line-height:1.35}
  .hello p{margin:2px 0 0;color:var(--ink-soft);font-weight:700;font-size:13px}
  .mascot{flex:none;width:64px;height:64px;filter:drop-shadow(0 6px 10px rgba(80,60,30,.16))}

  .stats{display:flex;gap:12px;margin:14px 0 22px}
  .stat{flex:1;background:var(--paper-2);border-radius:18px;box-shadow:var(--shadow);padding:14px;text-align:center;position:relative;overflow:hidden}
  .stat .n{font-family:var(--font-num);font-weight:800;font-size:30px;line-height:1;color:var(--ink)}
  .stat .l{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-top:5px}
  .stat .ic{position:absolute;right:-6px;top:-8px;font-size:42px;opacity:.14;transform:rotate(-10deg)}

  .sectionhead{display:flex;align-items:center;gap:10px;margin:8px 2px 12px}
  .sectionhead h2{font-family:var(--font-display);font-size:16px;margin:0}
  .sectionhead .line{flex:1;height:0;border-top:2px dashed var(--line)}

  /* deck grid */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .deck{
    position:relative;border-radius:20px;padding:16px 16px 14px;color:#fff;overflow:hidden;
    box-shadow:0 8px 0 rgba(0,0,0,.10), var(--shadow);transition:transform .12s, box-shadow .12s;cursor:pointer;
    min-height:128px;display:flex;flex-direction:column;
  }
  .deck:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.10), var(--shadow)}
  .deck .emoji{font-size:34px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.2))}
  .deck h3{font-family:var(--font-display);font-size:18px;margin:8px 0 2px;font-weight:400;text-shadow:0 1px 2px rgba(0,0,0,.18)}
  .deck .meta{font-size:12px;font-weight:700;opacity:.95}
  .deck .ring{position:absolute;right:62px;top:18px}
  .deckedit{position:absolute;right:8px;top:8px;width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.34);color:#fff;font-size:20px;z-index:6}
  .deckedit:active{transform:scale(.92);background:rgba(255,255,255,.5)}
  .deck .deco{position:absolute;right:-18px;bottom:-22px;font-size:96px;opacity:.16;transform:rotate(-12deg);pointer-events:none}
  .deck .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.35);margin-top:auto;overflow:hidden}
  .deck .bar i{display:block;height:100%;background:#fff;border-radius:999px;box-shadow:0 0 8px rgba(255,255,255,.6)}

  .addtile{
    border:3px dashed #E7C9A6;background:rgba(255,253,248,.7);color:var(--ink-soft);
    border-radius:20px;min-height:128px;display:grid;place-items:center;font-weight:800;cursor:pointer;
    transition:transform .12s,border-color .12s,color .12s;text-align:center;
  }
  .addtile:hover{border-color:var(--pink);color:var(--pink)}
  .addtile:active{transform:scale(.98)}
  .addtile .big{font-size:34px;display:block;margin-bottom:4px}

  /* ---------- deck detail ---------- */
  .backbtn{display:inline-flex;align-items:center;gap:7px;background:none;color:var(--ink-soft);font-weight:800;font-size:14px;padding:6px 0;margin:10px 0}
  .deckhero{border-radius:24px;padding:20px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg);margin-bottom:6px}
  .deckhero .emoji{font-size:46px}
  .deckhero h1{font-family:var(--font-display);font-weight:400;font-size:24px;margin:6px 0 2px;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .deckhero .sub{font-weight:700;font-size:13px;opacity:.95}
  .deckhero .deco{position:absolute;right:-14px;bottom:-30px;font-size:130px;opacity:.18;transform:rotate(-10deg)}
  .deckhero .tools{position:absolute;top:14px;right:14px;display:flex;gap:8px}
  .deckhero .tools .iconbtn{background:rgba(255,255,255,.25);color:#fff;backdrop-filter:blur(4px);box-shadow:none}

  .moderow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
  .modebtn{
    background:var(--paper-2);border-radius:18px;padding:14px 8px;text-align:center;box-shadow:0 5px 0 var(--line),var(--shadow);
    transition:transform .1s,box-shadow .1s;font-weight:800;font-size:13px;
  }
  .modebtn .e{font-size:26px;display:block;margin-bottom:4px}
  .modebtn:active{transform:translateY(5px);box-shadow:0 0 0 var(--line),var(--shadow)}
  .modebtn.p{color:var(--pink)} .modebtn.t{color:var(--teal-d)} .modebtn.s{color:var(--sky-d)}

  .cardrow{display:flex;align-items:center;gap:12px;background:var(--paper-2);border-radius:16px;padding:11px 12px;box-shadow:var(--shadow);margin-bottom:10px}
  .cardrow .thumb{width:46px;height:46px;border-radius:11px;object-fit:cover;background:#f0e8d8;flex:none}
  .cardrow .thumb.ph{display:grid;place-items:center;font-size:20px;color:#c9bda6}
  .cardrow .ft{flex:1;min-width:0}
  .cardrow .q{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cardrow .a{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cardrow .box{flex:none;font-size:11px;font-weight:800;color:#fff;background:var(--leaf);padding:3px 8px;border-radius:999px}
  .cardrow .box.no{background:#d9cdb8;color:#7a6f5c}
  .cardrow .edit{flex:none;color:var(--ink-soft);font-size:18px;padding:6px}

  /* ---------- modal ---------- */
  .modal-bg{position:fixed;left:0;right:0;top:0;height:var(--appvh,100vh);background:rgba(59,54,46,.45);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .2s}
  @media(min-width:560px){.modal-bg{align-items:center;padding:20px}}
  .modal{background:var(--paper-2);width:100%;max-width:520px;border-radius:24px 24px 0 0;box-shadow:var(--shadow-lg);max-height:calc(var(--appvh,100vh) - 8px);overflow:auto;animation:slideup .26s cubic-bezier(.2,.9,.3,1.2)}
  @media(min-width:560px){.modal{border-radius:24px}}
  .modal .mh{position:sticky;top:0;background:var(--paper-2);display:flex;align-items:center;gap:10px;padding:18px 18px 10px;z-index:2}
  .modal .mh h3{font-family:var(--font-display);font-size:18px;margin:0;flex:1}
  .modal .mb{padding:4px 18px 20px}
  .macts{position:sticky;bottom:0;display:flex;gap:10px;margin-top:18px;padding:12px 0 8px;background:var(--paper-2);border-top:1px solid var(--line)}
  .seg{display:inline-flex;background:var(--paper);border-radius:12px;padding:4px;gap:4px}
  .segbtn{font-weight:800;font-size:13px;padding:8px 14px;border-radius:9px;color:var(--ink-soft)}
  .segbtn.on{background:var(--paper-2);color:var(--ink);box-shadow:var(--shadow)}
  @keyframes slideup{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  label.fld{display:block;margin:14px 0 0}
  label.fld .lab{font-weight:800;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .input,.ta{width:100%;background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-size:16px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  .ta{resize:vertical;min-height:74px;line-height:1.5}
  .input:focus,.ta:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,111,143,.16)}

  .photobox{margin-top:8px;border:2px dashed var(--line);border-radius:16px;padding:14px;text-align:center;background:#fff}
  .photobox img{margin:0 auto 10px;border-radius:12px;max-height:200px;width:auto;box-shadow:var(--shadow)}
  .photo-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

  .palette{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
  .sw{width:34px;height:34px;border-radius:11px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s;border:3px solid transparent}
  .sw:active{transform:scale(.9)}
  .sw.on{border-color:var(--ink);transform:scale(1.06)}
  .emojipick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .ep{width:42px;height:42px;border-radius:12px;background:#fff;box-shadow:var(--shadow);font-size:22px;display:grid;place-items:center;cursor:pointer;border:3px solid transparent}
  .ep.on{border-color:var(--pink)}

  /* ---------- study ---------- */
  .study{max-width:560px;margin:0 auto;padding:10px 16px 60px}
  .study-top{display:flex;align-items:center;gap:12px;margin:6px 0 14px}
  .progress{flex:1;height:14px;background:var(--paper-2);border-radius:999px;box-shadow:inset 0 2px 4px rgba(80,60,30,.12);overflow:hidden}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#7fe3d6);border-radius:999px;transition:width .35s cubic-bezier(.2,.9,.3,1)}
  .study-count{font-family:var(--font-num);font-weight:800;color:var(--ink-soft);font-size:15px}

  .flip{perspective:1400px;}
  .flip-inner{position:relative;width:100%;min-height:340px;transition:transform .55s cubic-bezier(.3,.9,.3,1.1);transform-style:preserve-3d;cursor:pointer}
  .flip.on .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper-2);border-radius:26px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
  .face .tag{position:absolute;top:16px;left:16px;font-weight:800;font-size:12px;color:#fff;background:var(--pink);padding:4px 12px;border-radius:999px}
  .face.back{transform:rotateY(180deg);background:#FFFBEF}
  .face.back .tag{background:var(--teal)}
  .face img{max-height:170px;border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .face .big{font-family:var(--font-display);font-size:calc(30px*var(--bigscale,1));line-height:1.35;font-weight:400;word-break:break-word}
  .face .hint{margin-top:12px;color:var(--ink-soft);font-size:14px;font-weight:700}
  .tapnote{position:absolute;bottom:16px;left:0;right:0;color:var(--ink-soft);font-size:12px;font-weight:700;opacity:.8}

  .judge{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}

  .opt{display:flex;align-items:center;gap:12px;width:100%;background:var(--paper-2);border-radius:16px;padding:15px 16px;box-shadow:0 5px 0 var(--line),var(--shadow);font-weight:800;font-size:16px;text-align:left;margin-bottom:11px;transition:transform .08s,box-shadow .08s;border:2px solid transparent}
  .opt:active{transform:translateY(5px);box-shadow:0 0 0 var(--line),var(--shadow)}
  .opt .k{width:30px;height:30px;border-radius:9px;background:var(--paper);display:grid;place-items:center;font-family:var(--font-num);flex:none;color:var(--ink-soft)}
  .opt.correct{border-color:var(--teal);background:#E9FBF7}
  .opt.correct .k{background:var(--teal);color:#fff}
  .opt.wrong{border-color:var(--pink);background:#FFEEF1}
  .opt.wrong .k{background:var(--pink);color:#fff}
  .opt.dim{opacity:.5}

  .qbig{background:var(--paper-2);border-radius:22px;box-shadow:var(--shadow);padding:26px 20px;text-align:center;margin-bottom:16px}
  .qbig img{max-height:150px;margin:0 auto 12px;border-radius:12px}
  .qbig .q{font-family:var(--font-display);font-size:calc(26px*var(--bigscale,1));font-weight:400;word-break:break-word}
  .qbig .ask{color:var(--ink-soft);font-weight:700;font-size:13px;margin-bottom:8px}

  .typefb{border-radius:16px;padding:14px 16px;margin-top:14px;font-weight:800;display:none}
  .typefb.ok{display:block;background:#E9FBF7;color:var(--teal-d)}
  .typefb.ng{display:block;background:#FFEEF1;color:var(--pink-d)}
  .typefb .ans{display:block;font-size:14px;color:var(--ink);margin-top:4px}

  /* result */
  .result{text-align:center;padding:30px 16px;max-width:480px;margin:0 auto}
  .result .score{font-family:var(--font-num);font-size:70px;font-weight:800;line-height:1;color:var(--teal-d)}
  .result h2{font-family:var(--font-display);font-size:24px;margin:6px 0 2px}
  .result p{color:var(--ink-soft);font-weight:700}
  .result .mascot{width:120px;margin:6px auto 4px}
  .resbtns{display:flex;flex-direction:column;gap:12px;margin-top:24px}

  .empty{text-align:center;color:var(--ink-soft);padding:34px 16px}
  .empty .mascot{width:110px;margin:0 auto 10px}
  .empty p{font-weight:700}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:800;font-size:14px;padding:12px 20px;border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
  .pop{animation:pop .3s}
  @keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .rise{animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .hidden{display:none!important}
  .center{text-align:center}
  .mut{color:var(--ink-soft);font-weight:700;font-size:13px}
  hr.dash{border:none;border-top:2px dashed var(--line);margin:18px 0}
  .goalbar{height:12px;border-radius:999px;background:var(--paper);box-shadow:inset 0 2px 4px rgba(80,60,30,.12);overflow:hidden;margin:10px 0 4px}
  .goalbar i{display:block;height:100%;background:linear-gradient(90deg,var(--yellow),#ffd877);border-radius:999px;transition:width .4s}
  .caltitle{font-weight:700;font-size:12px;color:var(--ink-soft);margin:12px 0 6px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .calc{aspect-ratio:1;border-radius:5px;background:var(--paper)}
  .calc.lv1{background:#cdeede}.calc.lv2{background:#7fdcc0}.calc.lv3{background:var(--teal)}
  .speakbtn{background:var(--paper);color:var(--ink-soft);border-radius:10px;width:34px;height:34px;display:grid;place-items:center;font-size:16px;flex:none;box-shadow:var(--shadow)}
  .speakbtn:active{transform:scale(.9)}
  .face .speakbtn{position:absolute;top:14px;right:14px}
  .qbig{position:relative}
  .qbig .speakbtn.inq{position:absolute;top:12px;right:12px}
  .cardrow .speakbtn{width:30px;height:30px;font-size:14px;box-shadow:none}
  .studyopts{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 2px}
  .optseg{display:flex;align-items:center;gap:6px;background:var(--paper-2);border-radius:12px;padding:6px 8px;box-shadow:var(--shadow)}
  .optlbl{font-size:12px;font-weight:800;color:var(--ink-soft);margin-right:2px}
  .optseg .segbtn{padding:6px 11px;font-size:12px}
  /* ---------- dark mode ---------- */
  body.dark{--paper:#221d19;--paper-2:#322c26;--ink:#F3ECE0;--ink-soft:#bcb1a0;--line:#463e35;--dot:#39322b}
  body.dark .input,body.dark .ta{background:#2b2620;color:var(--ink)}
  body.dark .photobox{background:#2b2620}
  body.dark .face.back{background:#2c2620}
  body.dark .opt.correct{background:#16332b}
  body.dark .opt.wrong{background:#3a2330}
  body.dark .typefb.ok{background:#16332b}
  body.dark .typefb.ng{background:#3a2330}

<!-- hidden file inputs -->

<input id="fileImport" type="file" accept=".json,application/json" class="hidden">

<script>
"use strict";

/* =========================================================
   パシャ暗記  —  単一ファイル・外部APIなし・ローカル保存
   ========================================================= */

const DECK_COLORS = [
  ['pink','var(--pink)','var(--pink-d)'],
  ['teal','var(--teal)','var(--teal-d)'],
  ['sky','var(--sky)','var(--sky-d)'],
  ['yellow','var(--yellow)','var(--yellow-d)'],
  ['grape','var(--grape)','var(--grape-d)'],
  ['leaf','var(--leaf)','var(--leaf-d)'],
  ['orange','var(--orange)','var(--orange-d)'],
];
const DECK_EMOJI = ['📘','✏️','🌸','⭐','🔤','🌏','🧪','🔢','🎨','🎵','🐧','🍀','🏯','💡','📝','🦊'];
const MASTER_BOX = 4; // box>=4 を「おぼえた」とする（最大5）

/* ---------- tiny IndexedDB wrapper ---------- */
const DB_NAME='sugoi-anki', STORE='decks';
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{const db=r.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE,{keyPath:'id'});};
    r.onsuccess=()=>{_db=r.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
}
function tx(mode){return _db.transaction(STORE,mode).objectStore(STORE);}
function idbAll(){return new Promise((res,rej)=>{const r=tx('readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function idbPut(v){const _p=new Promise((res,rej)=>{const r=tx('readwrite').put(v);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); if(typeof scheduleSync==='function')scheduleSync(); return _p;}
function idbDel(id){const _p=new Promise((res,rej)=>{const r=tx('readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); if(typeof scheduleSync==='function')scheduleSync(); return _p;}

/* ---------- state ---------- */
let DECKS=[];               // [{id,name,emoji,color,createdAt,cards:[...]}]
let state={view:'home', deckId:null, session:null, studyOpts:{reverse:false,weak:false}};
let pendingImport=null;
let META=loadMeta();        // {streak, lastDay, totalReviews}

function loadMeta(){
  try{return JSON.parse(localStorage.getItem('sugoi-meta'))||{}}catch(e){return {}}
}
function saveMeta(){try{localStorage.setItem('sugoi-meta',JSON.stringify(META))}catch(e){} if(typeof scheduleSync==='function')scheduleSync();}

/* ---------- AI設定（任意・自分のAPIキー。キーはこの端末のみに保存） ---------- */
const AI_MODELS=[['claude-haiku-4-5','ふつう・最安（おすすめ）'],['claude-sonnet-4-6','高品質'],['claude-opus-4-8','最高品質']];
function loadApiKey(){try{return localStorage.getItem('pasha-anki-key')||''}catch(e){return ''}}
function saveApiKey(k){try{k?localStorage.setItem('pasha-anki-key',k):localStorage.removeItem('pasha-anki-key')}catch(e){}}
function loadAiModel(){try{return localStorage.getItem('pasha-anki-model')||'claude-haiku-4-5'}catch(e){return 'claude-haiku-4-5'}}
function saveAiModel(m){try{localStorage.setItem('pasha-anki-model',m)}catch(e){}}

/* ---------- 間隔反復・デイリーゴール・読み上げ ---------- */
const INTERVAL_DAYS=[0,1,3,7,16,35]; // box(0..5)ごとの復習間隔（日）
function cardDue(c){ if(!c.last)return true; const days=(Date.now()-c.last)/86400000; return days>=INTERVAL_DAYS[Math.min(5,c.box||0)]; }
function dueList(){ const cards=[],ids=new Set(); DECKS.forEach(d=>d.cards.forEach(c=>{ if(cardDue(c)){cards.push(c);ids.add(d.id);} })); return {cards,ids:[...ids]}; }
function dueCount(){ let n=0; DECKS.forEach(d=>d.cards.forEach(c=>{ if(cardDue(c))n++; })); return n; }
function dailyGoal(){ return META.dailyGoal||10; }
function todayCount(){ return (META.history&&META.history[todayStr()])||0; }
function addStudyCount(n){ META.history=META.history||{}; const t=todayStr(); META.history[t]=(META.history[t]||0)+n; saveMeta(); }
function calendarHTML(){
  const out=[]; const now=new Date();
  for(let i=27;i>=0;i--){ const d=new Date(); d.setDate(now.getDate()-i);
    const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const c=(META.history&&META.history[key])||0;
    let lv=0; if(c>=1)lv=1; if(c>=5)lv=2; if(c>=10)lv=3;
    out.push('<div class="calc lv'+lv+'" title="'+key+'：'+c+'枚"></div>');
  }
  return '<div class="cal">'+out.join('')+'</div>';
}
function speak(text){
  try{
    if(!('speechSynthesis' in window)||!text)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang=/[぀-ヿ㐀-鿿]/.test(text)?'ja-JP':'en-US';
    u.rate=0.95; speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
function qSide(card){ return (state.session&&state.session.reverse)?card.back:card.front; }
function aSide(card){ return (state.session&&state.session.reverse)?card.front:card.back; }
function b64encUtf8(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64decUtf8(b){ return decodeURIComponent(escape(atob(b))); }
function applyTheme(){ document.body.classList.toggle('dark',META.theme==='dark'); const m=document.querySelector('meta[name="theme-color"]'); if(m)m.setAttribute('content',META.theme==='dark'?'#221d19':'#FBF4E6'); }
function toggleTheme(){ META.theme=(META.theme==='dark')?'light':'dark'; saveMeta(); applyTheme(); menuModal(); toast(META.theme==='dark'?'ダークモードにしました 🌙':'ライトモードにしました ☀️'); }

/* ---------- 学年に合わせた最適化 ---------- */
const GRADES=[
  {k:'e12',label:'小1・2',scale:1.18,ai:'小学1〜2年生'},
  {k:'e34',label:'小3・4',scale:1.12,ai:'小学3〜4年生'},
  {k:'e56',label:'小5・6',scale:1.06,ai:'小学5〜6年生'},
  {k:'jh',label:'中学生',scale:1.0,ai:'中学生'},
  {k:'hs',label:'高校生',scale:0.98,ai:'高校生'},
  {k:'ad',label:'大人',scale:1.0,ai:'大人（資格・語学など）'}
];
function gradeObj(){ return GRADES.find(g=>g.k===META.grade)||null; }
function applyGrade(){ const g=gradeObj(); document.documentElement.style.setProperty('--bigscale', g?g.scale:1); }
function gradeModal(){
  const cur=META.grade;
  const opts=GRADES.map(g=>`<button class="btn ${g.k===cur?'':'ghost'} sm" data-action="gradeset" data-g="${g.k}">${g.label}</button>`).join('');
  openModal(`<div class="mh"><h3>🎓 学年をえらぶ</h3><button class="iconbtn" data-action="closeModal">✕</button></div>
    <div class="mb">
      <div class="mut" style="margin-bottom:12px">学年に合わせて、文字の大きさやAIが作る問題の難しさを調整します。あとから変更できます。</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${opts}</div>
    </div>`);
}
function setGrade(k){ META.grade=k; saveMeta(); applyGrade(); closeModal(); go('home'); const g=gradeObj(); toast((g?g.label:'')+' に合わせました 🎓'); }

function uid(){return 'id'+Math.random().toString(36).slice(2,10)+(performance.now()|0).toString(36);}
function deckById(id){return DECKS.find(d=>d.id===id);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function bumpStreak(){
  const t=todayStr();
  if(META.lastDay===t) return;
  const y=new Date(); y.setDate(y.getDate()-1);
  const ystr=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  META.streak = (META.lastDay===ystr)? (META.streak||0)+1 : 1;
  META.lastDay=t; saveMeta();
}

/* ---------- helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function colorVars(name){const c=DECK_COLORS.find(x=>x[0]===name)||DECK_COLORS[0];return {c:c[1],d:c[2]};}
function masteredCount(deck){return deck.cards.filter(c=>(c.box||0)>=MASTER_BOX).length;}
function deckPct(deck){return deck.cards.length? Math.round(masteredCount(deck)/deck.cards.length*100):0;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let toastTimer=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),1900);}

/* ---------- image resize ---------- */
async function fileToDataURL(file,max=1200,q=0.72){
  let bmp;
  try{ bmp = await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){ bmp = await loadImg(file); }
  let {width:w,height:h}= bmp;
  const scale=Math.min(1,max/Math.max(w,h));
  w=Math.round(w*scale); h=Math.round(h*scale);
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  cv.getContext('2d').drawImage(bmp,0,0,w,h);
  return cv.toDataURL('image/jpeg',q);
}
function loadImg(file){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=URL.createObjectURL(file);});}

/* =========================================================
   RENDER
   ========================================================= */
function render(){
  const app=$('#app');
  if(state.view==='home') app.innerHTML=viewHome();
  else if(state.view==='deck') app.innerHTML=viewDeck();
  else if(state.view==='flash') app.innerHTML=viewFlash();
  else if(state.view==='quiz') app.innerHTML=viewQuiz();
  else if(state.view==='type') app.innerHTML=viewType();
  else if(state.view==='listen') app.innerHTML=viewListen();
  else if(state.view==='result') app.innerHTML=viewResult();
  window.scrollTo(0,0);
  // entrance animation
  $$('.rise',app).forEach((el,i)=>{el.style.animationDelay=(i*55)+'ms';});
  if(state.view==='flash') wireFlash();
  if(state.view==='quiz') wireQuiz();
  if(state.view==='type') wireType();
  if(state.view==='listen') wireListen();
}

function go(view,opts={}){ if(state.view==='listen'&&view!=='listen'){listenToken++;try{speechSynthesis.cancel();}catch(_){}} state.view=view;if(view==='home')state.deckId=null;Object.assign(state,opts);render();}

/* ---------- HOME ---------- */
function viewHome(){
  const totalCards=DECKS.reduce((s,d)=>s+d.cards.length,0);
  const totalMastered=DECKS.reduce((s,d)=>s+masteredCount(d),0);
  const streak=META.streak||0;
  const due=dueCount(); const goal=dailyGoal(); const done=todayCount();

  let decks=DECKS.map((d,i)=>{
    const {c,d:dd}=colorVars(d.color);const pct=deckPct(d);
    return `<div class="deck rise" style="background:linear-gradient(140deg,${c},${dd})" data-action="open" data-id="${d.id}">
      <button class="deckedit" data-action="editdeck" data-id="${d.id}" title="名前を編集・削除">✏️</button>
      <div class="ring">${pct>0?`<span class="chip" style="background:rgba(255,255,255,.25);color:#fff;box-shadow:none">${pct}%</span>`:''}</div>
      <span class="emoji">${esc(d.emoji||'📘')}</span>
      <h3>${esc(d.name)}</h3>
      <div class="meta">カード ${d.cards.length}まい ・ おぼえた ${masteredCount(d)}</div>
      <span class="deco">${esc(d.emoji||'📘')}</span>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`;
  }).join('');

  return `
  <div class="hello rise">
    ${mascotSVG(64)}
    <div>
      <h1>こんにちは！<br>きょうも すこしずつ おぼえよう</h1>
      <p>${DECKS.length? '暗記帳をえらんでスタート 🚀':'まずは暗記帳をつくってみよう'}</p>
    </div>
  </div>

  ${DECKS.length?(due>0
    ? `<button class="btn lg block teal rise" data-action="review" style="margin:8px 0 2px">📅 今日のおさらい（${due}枚）</button>`
    : `<div class="panel rise" style="text-align:center;margin:8px 0 2px;font-weight:800">✅ 今日のおさらいは ぜんぶ完了！えらい！</div>`):''}

  ${!META.grade?`<button class="btn block ghost sm rise" data-action="gradesel" style="margin:6px 0 2px">🎓 学年をえらぶ（文字やAIが学年に合います）</button>`:''}

  <div class="stats rise">
    <div class="stat"><div class="n">${streak}</div><div class="l">れんぞく日数 🔥</div><span class="ic">🔥</span></div>
    <div class="stat"><div class="n">${totalCards}</div><div class="l">カードの数 🃏</div><span class="ic">🃏</span></div>
    <div class="stat"><div class="n">${totalMastered}</div><div class="l">おぼえた ⭐</div><span class="ic">⭐</span></div>
  </div>

  <div class="panel rise" style="margin-bottom:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="font-weight:800">🎯 今日の目標 <span style="font-family:var(--font-num);font-size:18px">${done}/${goal}</span> 枚 ${done>=goal&&done>0?'🎉':''}</div>
      <button class="btn ghost sm" data-action="setgoal">へんこう</button>
    </div>
    <div class="goalbar"><i style="width:${goal?Math.min(100,Math.round(done/goal*100)):0}%"></i></div>
    <div class="caltitle">さいきんの がんばり 📅</div>
    ${calendarHTML()}
  </div>

  <div class="sectionhead rise"><h2>わたしの暗記帳</h2><span class="line"></span></div>
  <div class="grid">
    ${decks}
    <div class="addtile rise" data-action="newdeck"><span><span class="big">＋</span>新しい暗記帳をつくる</span></div>
  </div>

  <div class="rise" style="margin-top:26px;text-align:center">
    <button class="btn ghost sm" data-action="photoBulk0">📷 写真からまとめてカードを作る</button>
  </div>
  `;
}

/* ---------- DECK DETAIL ---------- */
function viewDeck(){
  const d=deckById(state.deckId); if(!d) {go('home');return '';}
  const {c,dd}=colorVars(d.color);const col=colorVars(d.color);
  const pct=deckPct(d);
  const rev=!!(state.studyOpts&&state.studyOpts.reverse); const weak=!!(state.studyOpts&&state.studyOpts.weak);

    const box=card.box||0;const ok=box>=MASTER_BOX;
    return `<div class="cardrow rise" data-action="editcard" data-id="${card.id}">

      <div class="ft">
        <div class="q">${esc(card.front)||'(もんだい なし)'}</div>

      <span class="edit">✏️</span>
    </div>`;
  }).join('');

  return `
  <button class="backbtn" data-action="home">‹ もどる</button>
  <div class="deckhero rise" style="background:linear-gradient(140deg,${col.c},${col.d})">

      <button class="iconbtn" data-action="editdeck" title="暗記帳を編集">✏️</button>
    </div>
    <span class="emoji">${esc(d.emoji||'📘')}</span>
    <h1>${esc(d.name)}</h1>

    <span class="deco">${esc(d.emoji||'📘')}</span>
  </div>

  <div class="studyopts rise">
    <div class="optseg"><span class="optlbl">向き</span>
      <button class="segbtn ${rev?'':'on'}" data-action="optrev" data-v="0">ふつう</button>
      <button class="segbtn ${rev?'on':''}" data-action="optrev" data-v="1">⇄ 逆</button>
    </div>
    <div class="optseg"><span class="optlbl">範囲</span>
      <button class="segbtn ${weak?'':'on'}" data-action="optweak" data-v="0">ぜんぶ</button>

    </div>
  </div>

  <div class="moderow rise">
    <button class="modebtn p" data-action="start" data-mode="flash" ${d.cards.length?'':'disabled'}><span class="e">🔄</span>フラッシュ<br>カード</button>

  </div>

  <button class="btn block sky rise" data-action="listen" ${d.cards.length?'':'disabled'} style="margin:0 0 4px">🎧 聞き流し（自動で読み上げ）</button>

  <div style="display:flex;gap:10px;margin:14px 0">

function emptyCards(){
  return `<div class="empty">${mascotSVG(110)}<p>まだカードがないよ。<br>「＋カードを追加」か「📷写真から」で作ってみよう！</p></div>`;
}

/* =========================================================
   STUDY: FLASHCARD
   ========================================================= */
function startSession(mode){
  const d=deckById(state.deckId);
  const opts=state.studyOpts||{};
  let pool=opts.weak?d.cards.filter(c=>(c.box||0)<MASTER_BOX):d.cards.slice();
  if(!pool.length){toast(opts.weak?'にがてカードはありません！ぜんぶおぼえてる？🎉':'カードがありません');return;}
  if(mode==='quiz'&&pool.length<2){toast('クイズには2枚以上ひつようです');return;}
  pool.sort((a,b)=>(a.box||0)-(b.box||0));
  const groups={};pool.forEach(c=>{(groups[c.box||0]=groups[c.box||0]||[]).push(c);});
  const cards=Object.keys(groups).sort((a,b)=>a-b).flatMap(k=>shuffle(groups[k]));
  state.session={mode,cards,idx:0,correct:0,wrong:0,results:[],deckIds:[state.deckId],review:false,reverse:!!opts.reverse};
  go(mode);
}
function startReview(){
  const {cards:due,ids}=dueList();
  if(!due.length){toast('今日のおさらいは ぜんぶ完了！🎉');return;}
  const groups={};due.forEach(c=>{(groups[c.box||0]=groups[c.box||0]||[]).push(c);});
  const cards=Object.keys(groups).sort((a,b)=>a-b).flatMap(k=>shuffle(groups[k]));
  state.deckId=null;
  state.session={mode:'flash',cards,idx:0,correct:0,wrong:0,results:[],deckIds:ids,review:true};
  go('flash');
}

function viewFlash(){
  const s=state.session;const card=s.cards[s.idx];
  return `
  <div class="study">
    <div class="study-top">
      <button class="iconbtn" data-action="open" data-id="${state.deckId}">✕</button>
      <div class="progress"><i style="width:${s.idx/s.cards.length*100}%"></i></div>
      <span class="study-count">${s.idx+1}/${s.cards.length}</span>
    </div>
    <div class="flip" id="flip">
      <div class="flip-inner" id="flipInner">
        <div class="face front">
          <span class="tag">もんだい</span>
          ${qSide(card)?`<button class="speakbtn" data-action="speak" data-text="${esc(qSide(card))}">🔊</button>`:''}
          ${card.image?`<img src="${card.image}">`:''}
          <div class="big">${esc(qSide(card))}</div>
          ${card.hint?`<div class="hint">💡 ${esc(card.hint)}</div>`:''}
          <div class="tapnote">タップで こたえを見る 👆</div>
        </div>
        <div class="face back">
          <span class="tag">こたえ</span>
          ${aSide(card)?`<button class="speakbtn" data-action="speak" data-text="${esc(aSide(card))}">🔊</button>`:''}
          <div class="big">${esc(aSide(card))}</div>
          ${qSide(card)?`<div class="hint">${esc(qSide(card))}</div>`:''}
        </div>
      </div>
    </div>
    <div class="judge" id="judge" style="visibility:hidden">
      <button class="btn ghost" data-judge="again">🔁 もういちど</button>
      <button class="btn teal" data-judge="ok">⭕ できた！</button>
    </div>
  </div>`;
}
function wireFlash(){
  const flip=$('#flip'),judge=$('#judge');
  flip.addEventListener('click',e=>{
    if(e.target.closest('[data-action]'))return;
    flip.classList.toggle('on');
    if(flip.classList.contains('on')) judge.style.visibility='visible';
  });
  $$('[data-judge]').forEach(b=>b.addEventListener('click',()=>{
    const s=state.session,card=s.cards[s.idx];
    if(!card)return;
    if(b.dataset.judge==='ok'){card.box=Math.min(5,(card.box||0)+1);s.correct++;}
    else{card.box=Math.max(1,Math.min((card.box||0),1));s.wrong++;}
    card.last=Date.now();
    s.idx++;
    if(s.idx>=s.cards.length){finishSession();}
    else render();
  }));
}

/* =========================================================

function buildOptions(card){
  const deck=deckById(state.deckId);
  const correct=aSide(card);
  const others=shuffle(deck.cards.filter(c=>c.id!==card.id && aSide(c) && aSide(c)!==correct));
  const opts=[correct];
  for(const o of others){if(opts.length>=4)break;const v=aSide(o);if(!opts.includes(v))opts.push(v);}
  return shuffle(opts);
}
function viewQuiz(){
  const s=state.session;const card=s.cards[s.idx];
  if(!s.opts) s.opts=buildOptions(card);
  const letters=['A','B','C','D'];
  const opts=s.opts.map((o,i)=>`<button class="opt" data-opt="${esc(o)}"><span class="k">${letters[i]}</span><span>${esc(o)}</span></button>`).join('');
  return `

      <div class="ask">${s.reverse?'こたえは どれ？':'この いみは？'}</div>
      ${card.image?`<img src="${card.image}">`:''}

}
function wireQuiz(){
  const s=state.session;const card=s.cards[s.idx];const ans=aSide(card);
  $$('#opts .opt').forEach(b=>b.addEventListener('click',()=>{
    if(s.answered)return; s.answered=true;
    const chosen=b.dataset.opt;const correct=chosen===ans;
    $$('#opts .opt').forEach(x=>{

      else x.classList.add('dim');

}

function normalize(str){
  return (str||'').trim().toLowerCase().replace(/\s+/g,'')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0))
    .replace(/[。、.,!！?？]/g,'');
}
function viewType(){
  const s=state.session;const card=s.cards[s.idx];
  return `

}
function wireType(){
  const inp=$('#typeIn');inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();typecheck();}});
}
function typecheck(){
  const s=state.session;const card=s.cards[s.idx];const inp=$('#typeIn');
  if(s.answered){typeNext();return;}
  s.answered=true;
  const ok=normalize(inp.value)===normalize(aSide(card)) && inp.value.trim()!=='';
  const fb=$('#typefb');inp.disabled=true;
  if(ok){fb.className='typefb ok';fb.innerHTML='⭕ せいかい！';card.box=Math.min(5,(card.box||0)+1);s.correct++;burst(0.5,0.4);}
  else{fb.className='typefb ng';fb.innerHTML='✕ おしい！<span class="ans">こたえ：'+esc(aSide(card))+'</span>';card.box=1;s.wrong++;}
  card.last=Date.now();
  const btns=$('#typebtns');
  btns.innerHTML = (ok?'':'<button class="btn ghost block" data-action="typeforgive" style="margin-bottom:10px">やっぱり正解にする ⭕</button>')
    + '<button class="btn block teal" data-action="typenext">つぎへ ›</button>';
}
function typeforgive(){
  const s=state.session,card=s.cards[s.idx];
  if(s.lastForgiven)return;s.lastForgiven=true;
  s.wrong--;s.correct++;card.box=Math.min(5,(card.box||0)+1);
  $('#typefb').className='typefb ok';$('#typefb').innerHTML='⭕ 正解にしたよ！';
  burst(0.5,0.4);
}
function typeNext(){const s=state.session;s.answered=false;s.lastForgiven=false;s.idx++;if(s.idx>=s.cards.length)finishSession();else render();}

/* =========================================================
   FINISH + RESULT
   ========================================================= */
async function finishSession(){
  if(!state.session||state.session.done)return; state.session.done=true;
  const ids=(state.session&&state.session.deckIds)||[state.deckId];
  for(const id of ids){ const d=deckById(id); if(d) await idbPut(d); }
  bumpStreak();
  const n=state.session.cards.length;
  META.totalReviews=(META.totalReviews||0)+n; saveMeta();
  addStudyCount(n);
  go('result');
  setTimeout(()=>burst(0.5,0.35,160),150);
}
function viewResult(){
  const s=state.session;const total=s.correct+s.wrong;
  const pct=total?Math.round(s.correct/total*100):0;
  let title,msg;
  if(pct===100){title='かんぺき！すごい！';msg='ぜんもん せいかい！天才だ ✨';}
  else if(pct>=80){title='いいかんじ！';msg='その調子！もう少しでマスター 💪';}
  else if(pct>=50){title='よくがんばった！';msg='くりかえせば ぜったい おぼえられるよ';}
  else{title='ナイス チャレンジ！';msg='まちがえたところを もう一回やってみよう';}
  return `
  <div class="result">
    ${mascotSVG(120,pct>=80?'happy':'cheer')}
    <div class="score pop">${pct}<span style="font-size:30px">点</span></div>
    <h2>${title}</h2>
    <p>${msg}</p>
    <div class="chip" style="margin-top:10px">⭕ ${s.correct}　✕ ${s.wrong}　・　${total}もん</div>
    <div class="resbtns">
      <button class="btn lg block teal" data-action="restart">もう一回 やる 🔄</button>
      <button class="btn lg block ghost" data-action="open" data-id="${state.deckId}">暗記帳に もどる</button>
    </div>
  </div>`;
}

/* ----- OCR (端末内・任意・遅延ロード) ----- */
let _tessReady=null;
function loadTesseract(){
  if(_tessReady)return _tessReady;
  _tessReady=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=()=>res(window.Tesseract);
    s.onerror=()=>{_tessReady=null;rej(new Error('load'));};
    document.head.appendChild(s);
  });
  return _tessReady;
}
async function runOCR(imageURL,onProgress){
  const T=await loadTesseract();
  const {data}=await T.recognize(imageURL,'jpn+eng',{logger:m=>{if(m.status==='recognizing text'&&onProgress)onProgress(m.progress);}});
  return data.text||'';
}

  const c=modalState.card;if(!c.image)return;
  const area=$('#ocrArea');area.innerHTML=`<div class="panel" style="margin-top:10px"><div class="mut">📡 読み取り中… <span id="ocrPct">0%</span><br><span style="font-size:11px">※初回はファイルの取得に少し時間がかかります（オフライン時は使えません）</span></div></div>`;
  try{
    const text=await runOCR(c.image,p=>{const e=$('#ocrPct');if(e)e.textContent=Math.round(p*100)+'%';});
    const lines=text.split('\n').map(s=>s.trim()).filter(Boolean);
    area.innerHTML=`<div class="panel" style="margin-top:10px">
      <div class="lab" style="font-weight:800;margin-bottom:6px">🔎 読み取り結果（タップで入れる）</div>
      <div class="mut" style="margin-bottom:8px">行をタップ → もんだい/こたえ に入れられます</div>
      ${lines.map(l=>`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
          <div style="flex:1;background:#fff;border:2px solid var(--line);border-radius:10px;padding:7px 10px;font-size:14px">${esc(l)}</div>
          <button class="btn sm" data-ocrset="front" data-val="${esc(l)}">問</button>
          <button class="btn sm teal" data-ocrset="back" data-val="${esc(l)}">答</button>
        </div>`).join('')||'<div class="mut">文字が読み取れませんでした</div>'}
    </div>`;
    area.querySelectorAll('[data-ocrset]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.ocrset==='front'?$('#cFront'):$('#cBack');
      t.value=(t.value?t.value+' ':'')+b.dataset.val;
    }));
  }catch(e){
    area.innerHTML=`<div class="panel" style="margin-top:10px"><div class="mut">読み取りに失敗しました。インターネット接続をご確認ください（この機能のみ初回にデータ取得が必要です）。手入力でもOKです。</div></div>`;
  }
}

function parseLine(line){
  const seps=[/\t/,/[:：]/,/[,，、]/,/\s{2,}/,/[　]/,/\s/];
  for(const re of seps){const m=line.split(re);if(m.length>=2){const f=m[0].trim();const b=m.slice(1).join(' ').trim();if(f&&b)return[f,b];}}
  return [line.trim(),''];
}

/* 文章→穴埋め（端末内・無料・APIなし） */
function pickKeyword(s){
  let m=s.match(/[「『]([^」』]{1,18})[」』]/); if(m)return m[1];
  m=s.match(/[゠-ヿーー]{3,}/); if(m)return m[0];
  m=s.match(/[一-鿿]{2,}/); if(m)return m[0];
  m=s.match(/\d[\d,\.]*\s*[^\s。、,]{0,4}/); if(m)return m[0].trim();
  return null;
}
function clozeFromText(text){
  const out=[];
  const parts=text.split(/[。\.!?！？\n]+/).map(s=>s.trim()).filter(s=>s.length>=6);
  for(const s of parts){
    const kw=pickKeyword(s); if(!kw)continue;
    const front=s.replace(kw,'（　____　）'); if(front===s)continue;
    out.push([front,kw]);
  }
  return out;
}

/* ----- AI生成（任意・自分のAPIキー・ブラウザから直接Claudeを呼ぶ） ----- */
function parseAiCards(text){
  let t=(text||'').trim().replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();
  let data=null;
  try{ data=JSON.parse(t); }
  catch(e){ const m=t.match(/\{[\s\S]*\}/); if(m){try{data=JSON.parse(m[0]);}catch(e2){}} }
  const arr = data && Array.isArray(data.cards) ? data.cards : (Array.isArray(data)?data:[]);
  return arr.map(c=>[String((c&&c.front)||'').trim(),String((c&&c.back)||'').trim()]).filter(p=>p[0]||p[1]);
}
async function aiGenerateFromImage(dataURL){
  const key=loadApiKey(); if(!key)throw new Error('NO_KEY');
  const comma=dataURL.indexOf(',');
  const b64=dataURL.slice(comma+1);
  const mt=(dataURL.slice(5,comma).split(';')[0])||'image/jpeg';
  const _g=gradeObj(); const _gh=_g?('対象は'+_g.ai+'。その学年に合った難しさ・言葉づかい・分量で作ってください。'):'';
  const prompt='あなたは小中高生の学習を助ける先生です。'+_gh+'この画像（教科書・ノート・単語リストなど）から暗記カードを作ってください。各カードは front（覚える語・問い）と back（答え・意味）のペアです。画像内の主要な学習項目を漏れなく、子どもが覚えやすい簡潔な形に。英単語なら front=英語 / back=日本語。社会や理科の用語は front=用語や問い / back=答えや説明。出力は次のJSONのみで、前後に説明やマークダウンを一切付けないこと:\n{"cards":[{"front":"...","back":"..."}]}';
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:loadAiModel(),max_tokens:4000,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mt,data:b64}},
      {type:'text',text:prompt}
    ]}]})
  });
  if(!res.ok){
    let detail=''; try{ const ej=await res.json(); detail=(ej&&ej.error&&ej.error.message)||''; }catch(_e){}
    let msg='AIエラー ('+res.status+')';
    if(res.status===401)msg='APIキーが正しくないようです（⚙️AI設定で確認）';
    else if(res.status===403)msg='このキーでは使えません。権限や支払い設定（クレジット残高）をご確認ください';
    else if(res.status===429)msg='回数の制限です。少し待ってからもう一度';
    else if(res.status===400)msg='リクエストエラー';
    else if(res.status>=500)msg='サーバー側のエラー。少し待って再度';
    throw new Error(detail ? (msg+'：'+detail) : msg);
  }
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  return parseAiCards(text);
}

/* ----- 画像トリミング（端末内・モーダル内で完結） ----- */
function cropInline(container, src, onApply){
  if(!container)return;
  container.innerHTML=`
    <div class="mut" style="margin-bottom:8px">わくをドラッグで移動／右下で大きさ調整</div>
    <div id="cropWrap" style="position:relative;touch-action:none;user-select:none;max-width:100%;margin:0 auto;line-height:0;border-radius:12px;overflow:hidden;background:#0003">
      <img id="cropImg" src="${src}" style="display:block;width:100%;pointer-events:none">
      <div id="cropRect" style="position:absolute;border:2px solid #fff;box-shadow:0 0 0 3000px rgba(0,0,0,.5);box-sizing:border-box">
        <div style="position:absolute;right:-12px;bottom:-12px;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--pink)"></div>
      </div>
    </div>
    <div class="photo-actions" style="margin-top:10px">
      <button class="btn sm teal" id="cropDo">✂️ 切り抜く</button>
      <button class="btn ghost sm" id="cropCancel">↩︎ もどる</button>
    </div>`;
  const wrap=container.querySelector('#cropWrap'), img=container.querySelector('#cropImg'), r=container.querySelector('#cropRect');
  let w=0,h=0,rx=0,ry=0,rw=0,rh=0,mode=null,sx=0,sy=0,ox=0,oy=0,ow=0,oh=0;
  function draw(){r.style.left=rx+'px';r.style.top=ry+'px';r.style.width=rw+'px';r.style.height=rh+'px';}
  function setup(){ w=img.clientWidth;h=img.clientHeight; if(!w){setTimeout(setup,60);return;} rx=w*0.08;ry=h*0.08;rw=w*0.84;rh=h*0.84; draw(); }
  function pt(e){const b=wrap.getBoundingClientRect();return{x:e.clientX-b.left,y:e.clientY-b.top};}
  wrap.addEventListener('pointerdown',e=>{const p=pt(e);
    const nearH=(p.x>rx+rw-32&&p.y>ry+rh-32);
    const inside=(p.x>=rx&&p.x<=rx+rw&&p.y>=ry&&p.y<=ry+rh);
    if(nearH)mode='resize'; else if(inside)mode='move'; else return;
    sx=p.x;sy=p.y;ox=rx;oy=ry;ow=rw;oh=rh; try{wrap.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault();
  });
  wrap.addEventListener('pointermove',e=>{ if(!mode)return; const p=pt(e),dx=p.x-sx,dy=p.y-sy;
    if(mode==='move'){rx=Math.max(0,Math.min(w-rw,ox+dx));ry=Math.max(0,Math.min(h-rh,oy+dy));}
    else{rw=Math.max(30,Math.min(w-rx,ow+dx));rh=Math.max(30,Math.min(h-ry,oh+dy));} draw();
  });
  wrap.addEventListener('pointerup',()=>{mode=null;});
  container.querySelector('#cropDo').addEventListener('click',()=>{
    const im=new Image();
    im.onload=()=>{ if(!w){onApply(null);return;} const scx=im.naturalWidth/w, scy=im.naturalHeight/h;
      const cw=Math.max(1,Math.round(rw*scx)), ch=Math.max(1,Math.round(rh*scy));
      const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
      cv.getContext('2d').drawImage(im,Math.round(rx*scx),Math.round(ry*scy),cw,ch,0,0,cw,ch);
      onApply(cv.toDataURL('image/jpeg',0.82));
    };
    im.onerror=()=>onApply(null); im.src=src;
  });
  container.querySelector('#cropCancel').addEventListener('click',()=>onApply(null));
  if(img.complete&&img.clientWidth)setup(); else img.addEventListener('load',setup);
}

let listenToken=0;
function startListen(){

  go('listen');
}
function viewListen(){
  const s=state.session;const card=s.cards[s.idx];
  return `<div class="study">
    <div class="study-top">

      <div>
        <div class="ask">🎧 聞き流し中…</div>
        <div class="q" id="listenQ" style="margin:12px 0">${esc(qSide(card))}</div>
        <div class="big" id="listenA" style="font-family:var(--font-display);color:var(--teal-d);min-height:1.4em">${s.phase==='a'?esc(aSide(card)):''}</div>
      </div>
    </div>

      <button class="btn ghost" data-action="listentoggle">${s.paused?'▶ さいせい':'⏸ いちじ停止'}</button>
      <button class="btn ghost" data-action="open" data-id="${state.deckId}">やめる</button>
    </div>
  </div>`;
}
function listenDur(t){ return Math.min(6000, Math.max(1200, String(t||'').length*130+700)); }
function paintListen(){
  const s=state.session; if(!s||s.mode!=='listen')return; const card=s.cards[s.idx]; if(!card)return;
  const c=$('.study-count'); if(c)c.textContent=(s.idx+1)+'/'+s.cards.length;
  const p=$('.progress i'); if(p)p.style.width=(s.idx/s.cards.length*100)+'%';
  const q=$('#listenQ'); if(q)q.textContent=qSide(card);
  const a=$('#listenA'); if(a)a.textContent=(s.phase==='a')?aSide(card):'';
}
function wireListen(){ listenToken++; const my=listenToken; listenTick(my); }
function listenTick(tok){
  if(tok!==listenToken)return; const s=state.session; if(!s||s.mode!=='listen'||s.paused)return;
  if(s.idx>=s.cards.length){ finishListen(); return; }
  const card=s.cards[s.idx];
  s.phase='q'; paintListen(); speak(qSide(card));
  setTimeout(()=>{ if(tok!==listenToken||s.paused)return;
    s.phase='a'; paintListen(); speak(aSide(card));
    setTimeout(()=>{ if(tok!==listenToken||s.paused)return; s.idx++;
      setTimeout(()=>listenTick(tok), 250);
    }, listenDur(aSide(card))+400);
  }, listenDur(qSide(card))+300);
}
function finishListen(){
  const s=state.session; const n=s?s.cards.length:0;
  bumpStreak(); META.totalReviews=(META.totalReviews||0)+n; saveMeta(); addStudyCount(n);

/* ====== クラウド同期（任意・Supabase。設定はこの端末に保存・写真とAPIキーは同期しない） ====== */
let _sbReady=null,_sb=null,_syncCh=null,_syncApplying=false,_syncTimer=null,syncStatus='off';
function syncUrl(){ return (localStorage.getItem('pasha-sync-url')||'').replace(/\/+$/,''); }
function syncKey(){ return localStorage.getItem('pasha-sync-key')||''; }
function syncCode(){ return localStorage.getItem('pasha-sync-code')||''; }
function syncOn(){ return localStorage.getItem('pasha-sync-on')==='1' && !!syncUrl() && !!syncKey() && !!syncCode(); }
function deviceId(){ let d=localStorage.getItem('pasha-device'); if(!d){d='dv'+Math.random().toString(36).slice(2,10); try{localStorage.setItem('pasha-device',d);}catch(e){}} return d; }
function loadScript(src){ return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('読込失敗'));document.head.appendChild(s);}); }
function loadSupabase(){ if(_sbReady)return _sbReady; _sbReady=loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2').then(()=>window.supabase).catch(e=>{_sbReady=null;throw e;}); return _sbReady; }
async function startSync(){
  if(!syncOn())return;
  try{
    const lib=await loadSupabase();
    _sb=lib.createClient(syncUrl(), syncKey());
    const code=syncCode();
    const {data:row,error}=await _sb.from('families').select('data,updated_by').eq('code',code).maybeSingle();
    if(error)throw error;
    if(row&&row.data){ await applyRemote(row.data, true); }
    await pushNow();
    if(_syncCh){try{_sb.removeChannel(_syncCh);}catch(e){}}
    _syncCh=_sb.channel('fam-'+code)
      .on('postgres_changes',{event:'*',schema:'public',table:'families',filter:'code=eq.'+code}, payload=>{
        const r=payload&&payload.new; if(!r||r.updated_by===deviceId())return; if(r.data)applyRemote(r.data,false);
      }).subscribe();
    syncStatus='接続中'; toast('クラウド同期：接続しました ☁️');
  }catch(e){ syncStatus='エラー：'+((e&&e.message)||''); toast('同期エラー：URL/キー/テーブル設定をご確認ください'); }
}
function stopSync(){ if(_syncCh&&_sb){try{_sb.removeChannel(_syncCh);}catch(e){}} _syncCh=null; _sb=null; syncStatus='off'; }
async function applyRemote(data, merge){
  _syncApplying=true;
  try{
    const imgMap={}; DECKS.forEach(d=>d.cards.forEach(c=>{ if(c.image)imgMap[c.id]=c.image; }));
    const remoteDecks=((data.decks)||[]).map(d=>({id:d.id,name:d.name||'',emoji:d.emoji||'📘',color:d.color||'pink',createdAt:d.createdAt||Date.now(),cards:((d.cards)||[]).map(c=>({id:c.id,front:c.front||'',back:c.back||'',hint:c.hint||'',box:c.box||0,last:c.last||0,image:imgMap[c.id]||null}))}));
    if(merge){ const rid=new Set(remoteDecks.map(d=>d.id)); DECKS=remoteDecks.concat(DECKS.filter(d=>!rid.has(d.id))); }
    else { DECKS=remoteDecks; }
    if(data.meta){ const m=data.meta; META.streak=m.streak||0; META.lastDay=m.lastDay||''; META.totalReviews=m.totalReviews||0; META.dailyGoal=m.dailyGoal||META.dailyGoal||10; META.history=m.history||{}; if(m.grade)META.grade=m.grade; saveMeta(); }
    for(const d of DECKS){ await idbPut(d); }
    applyGrade(); if(state.view==='home'||state.view==='deck')render();
  }catch(e){} finally{ _syncApplying=false; }
}
function scheduleSync(){ if(!syncOn()||_syncApplying||!_sb)return; clearTimeout(_syncTimer); _syncTimer=setTimeout(pushNow,1200); }
async function pushNow(){
  if(!_sb||!syncOn())return;
  try{
    const decks=DECKS.map(d=>({id:d.id,name:d.name||'',emoji:d.emoji||'📘',color:d.color||'pink',createdAt:d.createdAt||0,cards:((d.cards)||[]).map(c=>({id:c.id,front:c.front||'',back:c.back||'',hint:c.hint||'',box:c.box||0,last:c.last||0}))}));
    const meta={streak:META.streak||0,lastDay:META.lastDay||'',totalReviews:META.totalReviews||0,dailyGoal:META.dailyGoal||10,history:META.history||{},grade:META.grade||''};
    const {error}=await _sb.from('families').upsert({code:syncCode(),data:{decks,meta},updated_by:deviceId(),updated_at:Date.now()});
    if(error)syncStatus='エラー：'+(error.message||'');
  }catch(e){ syncStatus='エラー：'+((e&&e.message)||''); }
}
function parseFbConfig(text){ try{ const m=String(text).match(/\{[\s\S]*\}/); if(!m)return null; return (new Function('return ('+m[0]+')'))(); }catch(e){ return null; } }

/* =========================================================
   CONFETTI 🎉
   ========================================================= */
let cf={c:null,ctx:null,parts:[],raf:0};
function initConfetti(){
  cf.c=$('#confetti');cf.ctx=cf.c.getContext('2d');resizeCf();
  window.addEventListener('resize',resizeCf);
}
function resizeCf(){if(!cf.c)return;cf.c.width=innerWidth;cf.c.height=innerHeight;}
function burst(x=0.5,y=0.4,count=90){
  const cols=['#FF6F8F','#1FC3B0','#FFC23C','#54C4F2','#A98BF0','#8BC53F'];
  for(let i=0;i<count;i++){
    cf.parts.push({x:cf.c.width*x,y:cf.c.height*y,
      vx:(Math.random()-0.5)*12,vy:(Math.random()*-12-4),
      g:0.35+Math.random()*0.2,s:6+Math.random()*7,
      col:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-0.5)*0.4,life:60+Math.random()*40});
  }
  if(!cf.raf)stepCf();
}
function stepCf(){
  const {ctx,c}=cf;ctx.clearRect(0,0,c.width,c.height);
  cf.parts=cf.parts.filter(p=>p.life>0);
  for(const p of cf.parts){
    p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--;p.vx*=0.99;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.globalAlpha=Math.min(1,p.life/30);
    ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();
  }
  if(cf.parts.length)cf.raf=requestAnimationFrame(stepCf);else{cf.raf=0;ctx.clearRect(0,0,c.width,c.height);}
}
